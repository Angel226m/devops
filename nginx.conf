# ═══════════════════════════════════════════════════════════════
# NGINX CONFIGURATION - HARDENED SECURITY
# OWASP Top 10 + ISO 27001 Compliance
# ═══════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ═══════════════════════════════════════════════════════════════
    # WEBSOCKET MAPPING
    # ═══════════════════════════════════════════════════════════════
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ═══════════════════════════════════════════════════════════════
    # LOGGING CONFIGURATION (OWASP A09:2021)
    # ═══════════════════════════════════════════════════════════════
    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        '$request_time $upstream_response_time '
                        '$pipe $connection_requests';

    log_format blocked '$remote_addr - [$time_local] "$request" '
                       'BLOCKED - Reason: $limit_req_status';

    access_log /var/log/nginx/access.log security;
    error_log /var/log/nginx/error.log warn;

    # ═══════════════════════════════════════════════════════════════
    # PERFORMANCE OPTIMIZATIONS
    # ═══════════════════════════════════════════════════════════════
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 100;
    reset_timedout_connection on;
    client_body_timeout 15;
    client_header_timeout 15;
    send_timeout 15;

    # Body size limits (prevent payload attacks)
    client_max_body_size 25M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ═══════════════════════════════════════════════════════════════
    # RATE LIMITING - ANTI BRUTE FORCE (OWASP A07:2021)
    # ═══════════════════════════════════════════════════════════════
    
    # Zona general API - 10 req/s por IP
    limit_req_zone $binary_remote_addr zone=api:20m rate=10r/s;
    
    # Zona LOGIN - Protección contra fuerza bruta - 3 req/min por IP
    limit_req_zone $binary_remote_addr zone=login_admin:10m rate=3r/m;
    limit_req_zone $binary_remote_addr zone=login_reservas:10m rate=3r/m;
    
    # Zona CrackGuard - 5 req/s
    limit_req_zone $binary_remote_addr zone=crackguard:10m rate=5r/s;
    
    # Zona global por IP - 100 req/s (anti-DDoS)
    limit_req_zone $binary_remote_addr zone=global:50m rate=100r/s;
    
    # Zona de conexiones simultáneas
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    
    # Rate limit por URI específico (prevenir scraping)
    limit_req_zone $request_uri zone=uri_limit:10m rate=5r/s;

    # Logging de rate limiting
    limit_req_log_level warn;
    limit_req_status 429;

    # ═══════════════════════════════════════════════════════════════
    # COMPRESSION (OWASP Best Practices)
    # ═══════════════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/rdf+xml
        image/svg+xml;
    
    # Deshabilitar gzip para IE6 (seguridad)
    gzip_disable "msie6";

    # ═══════════════════════════════════════════════════════════════
    # SECURITY HEADERS - OWASP COMPLIANT (A05:2021)
    # ═══════════════════════════════════════════════════════════════
    
    # Prevenir Clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # Prevenir MIME-Type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS Protection (legacy pero útil)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy (antes Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy (CSP) - Base restrictiva
    # Nota: Ajustar según necesidades de React
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # Remove server tokens (hide nginx version)
    server_tokens off;
    more_clear_headers Server;

    # ═══════════════════════════════════════════════════════════════
    # HIDE SENSITIVE INFORMATION
    # ═══════════════════════════════════════════════════════════════
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-AspNetMvc-Version;

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAM DEFINITIONS
    # ═══════════════════════════════════════════════════════════════

    upstream backend_servers {
        server backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    upstream frontend_servers {
        server frontend-container:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream paginawebbtour_servers {
        server paginawebbtour-container:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream crackguard_backend {
        server crackguard-backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream crackguard_frontend {
        server crackguard-frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECTS
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        # Rate limit global
        limit_req zone=global burst=200 nodelay;
        limit_conn conn_limit 20;

        location /health {
            access_log off;
            return 200 "nginx-admin-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://admin.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        server_name reservas.angelproyect.com www.reservas.angelproyect.com;

        limit_req zone=global burst=200 nodelay;
        limit_conn conn_limit 20;

        location /health {
            access_log off;
            return 200 "nginx-reservas-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://reservas.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        server_name crackguard.angelproyect.com www.crackguard.angelproyect.com;

        limit_req zone=global burst=200 nodelay;
        limit_conn conn_limit 20;

        location /health {
            access_log off;
            return 200 "nginx-crackguard-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://crackguard.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        server_name stream.angelproyect.com www.stream.angelproyect.com;

        limit_req zone=global burst=200 nodelay;
        limit_conn conn_limit 20;

        location /health {
            access_log off;
            return 200 "nginx-stream-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://stream.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80 default_server;
        server_name _;
        return 444; # Close connection without response
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - ADMIN.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl http2;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        # Rate limit global
        limit_req zone=global burst=200 nodelay;
        limit_conn conn_limit 30;

        # ═══════════════════════════════════════════════════════════
        # SSL/TLS CONFIGURATION (OWASP A02:2021)
        # ═══════════════════════════════════════════════════════════
        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;
        
        # Protocolos seguros únicamente
        ssl_protocols TLSv1.2 TLSv1.3;
        
        # Ciphers seguros (Mozilla Modern)
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        
        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # HSTS (HTTP Strict Transport Security)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ═══════════════════════════════════════════════════════════
        # HEALTH CHECK
        # ═══════════════════════════════════════════════════════════
        location /health {
            access_log off;
            return 200 "admin-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # ═══════════════════════════════════════════════════════════
        # LOGIN ENDPOINT - PROTECCIÓN ANTI BRUTE FORCE
        # ═══════════════════════════════════════════════════════════
        location = /api/v1/auth/login {
            # Rate limit ESTRICTO: 3 intentos por minuto
            limit_req zone=login_admin burst=2 nodelay;
            limit_req_status 429;
            
            # Log bloqueados
            access_log /var/log/nginx/admin_login_blocked.log blocked if=$limit_req_status;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            # Headers de seguridad
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
            
            # Cache para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://paginawebbtour_servers;
                proxy_cache_valid 200 7d;
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        # React Router fallback
        error_page 404 = @reservas_fallback;
        location @reservas_fallback {
            proxy_pass http://paginawebbtour_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - STREAM.ANGELPROYECT.COM (WebRTC Streaming)
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl http2;
        server_name stream.angelproyect.com www.stream.angelproyect.com;

        # Rate limit para streaming
        limit_req zone=global burst=100 nodelay;
        limit_conn conn_limit 50;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /health {
            access_log off;
            return 200 "stream-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # Proxy a FRP (MediaMTX) - WebRTC Streaming
        location / {
            proxy_pass http://172.17.0.1:19889/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # WebSocket support para WebRTC
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Timeouts largos para streaming
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # Sin buffering (crítico para video en vivo)
            proxy_buffering off;
            proxy_request_buffering off;
            
            # CORS permisivo para WebRTC
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - CRACKGUARD.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl http2;
        server_name crackguard.angelproyect.com www.crackguard.angelproyect.com;

        # Rate limit global
        limit_req zone=global burst=200 nodelay;
        limit_conn conn_limit 30;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /health {
            access_log off;
            return 200 "crackguard-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # ═══════════════════════════════════════════════════════════
        # CÁMARA HTML PAGE
        # ═══════════════════════════════════════════════════════════
        location = /camera {
            alias /var/www/html/camera.html;
            add_header Content-Type text/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Frame-Options SAMEORIGIN always;
        }

        # ═══════════════════════════════════════════════════════════
        # STREAMING FRP (WebRTC via MediaMTX)
        # ═══════════════════════════════════════════════════════════
        location /stream/ {
            # FRP Server en host (puerto 19889)
            proxy_pass http://172.17.0.1:19889/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # WebSocket para WebRTC
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Timeouts largos
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # Sin buffering
            proxy_buffering off;
            proxy_request_buffering off;
            
            # CORS para WebRTC
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        # ═══════════════════════════════════════════════════════════
        # WEBSOCKET RASPBERRY PI
        # ═══════════════════════════════════════════════════════════
        location /ws/raspberry {
            proxy_pass http://crackguard_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Timeouts largos para WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            proxy_buffering off;
        }

        # ═══════════════════════════════════════════════════════════
        # API CRACKGUARD (Flask Backend)
        # ═══════════════════════════════════════════════════════════
        location /api/ {
            limit_req zone=crackguard burst=15 nodelay;
            limit_req_status 429;

            proxy_pass http://crackguard_backend/api/;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # CORS
            add_header Access-Control-Allow-Origin "https://crackguard.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://crackguard.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Type text/plain always;
                add_header Content-Length 0 always;
                return 204;
            }

            # Timeouts extendidos para procesamiento de imágenes
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
            client_body_buffer_size 20M;
        }

        # ═══════════════════════════════════════════════════════════
        # FRONTEND CRACKGUARD (React)
        # ═══════════════════════════════════════════════════════════
        location / {
            proxy_pass http://crackguard_frontend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
            
            # Cache para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://crackguard_frontend;
                proxy_cache_valid 200 7d;
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        # React Router fallback
        error_page 404 = @crackguard_fallback;
        location @crackguard_fallback {
            proxy_pass http://crackguard_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # DEFAULT HTTPS SERVER - BLOCK UNKNOWN HOSTS
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2 default_server;
        server_name _;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        return 444; # Close connection without response
    }
} https;
            proxy_set_header X-Forwarded-Host $host;
            
            # CORS específico
            add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials true always;

            # OPTIONS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Type text/plain always;
                add_header Content-Length 0 always;
                return 204;
            }

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 15s;
            proxy_read_timeout 15s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ═══════════════════════════════════════════════════════════
        # API V1 - RATE LIMITED
        # ═══════════════════════════════════════════════════════════
        location /api/v1/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # CORS
            add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials true always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Max-Age 86400 always;

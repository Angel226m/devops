events {
    worker_connections 2048;  # ✅ Aumentado de 1024
    use epoll;  # ✅ Mejor rendimiento en Linux
    multi_accept on;  # ✅ Aceptar múltiples conexiones a la vez
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ═══════════════════════════════════════════════════════════════
    # PERFORMANCE & SECURITY SETTINGS
    # ═══════════════════════════════════════════════════════════════

    # ✅ Charset por defecto
    charset utf-8;

    # ✅ Ocultar versión de Nginx
    server_tokens off;
  #  more_clear_headers Server;  # Requiere nginx-module-headers-more

    # ✅ Optimización de buffers
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    output_buffers 1 32k;
    postpone_output 1460;

    # ✅ MAPA PARA WEBSOCKET
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ✅ Configuración de logs con formato extendido
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;
    error_log /var/log/nginx/error.log warn;

    # ✅ Configuraciones básicas optimizadas
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    client_max_body_size 25M;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # ✅ Rate limiting mejorado con zonas separadas
    limit_req_zone $binary_remote_addr zone=api:10m rate=15r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;
    limit_req_zone $binary_remote_addr zone=crackguard:10m rate=5r/s;
    
    # ✅ Limit para conexiones simultáneas
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ✅ Configuración de gzip mejorada
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;  # Balance entre CPU y compresión
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/json
        application/ld+json
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;
    gzip_proxied any;
    gzip_disable "msie6";

    # ✅ Brotli compression (si tienes el módulo)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # ✅ Headers de seguridad globales mejorados
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # ✅ CSP básico (ajustar según necesidades)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # ✅ Proxy headers comunes (definir una vez)
    map $scheme $proxy_x_forwarded_ssl {
        default off;
        https on;
    }

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAMS - SISTEMA TOURS
    # ═══════════════════════════════════════════════════════════════

    upstream backend_servers {
        server backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;  # ✅ Aumentado de 32
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    upstream frontend_servers {
        server frontend-container:80 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
    }

    upstream paginawebbtour_servers {
        server paginawebbtour-container:80 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
    }

    # ═══════════════════════════════════════════════════════════════
    # UPSTREAMS - CRACKGUARD (NO MODIFICADO)
    # ═══════════════════════════════════════════════════════════════

    upstream crackguard_backend {
        server crackguard-backend:5000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream crackguard_frontend {
        server crackguard-frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════
    # SSL/TLS CONFIGURATION - MEJORES PRÁCTICAS 2025
    # ═══════════════════════════════════════════════════════════════

    # ✅ Configuración SSL compartida
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;  # Dejar que el cliente elija (mejor para TLS 1.3)
    ssl_session_cache shared:SSL:50m;  # ✅ Aumentado de 10m
    ssl_session_timeout 1d;  # ✅ Aumentado de 10m
    ssl_session_tickets off;  # ✅ Mejor seguridad
    
    # ✅ OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ✅ DH Parameters (generar con:  openssl dhparam -out /etc/nginx/dhparam.pem 4096)
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ═══════════════════════════════════════════════════════════════
    # HTTP → HTTPS REDIRECTS
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 80;
        listen [::]:80;  # ✅ IPv6
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-admin-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://admin.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name reservas.angelproyect.com www.reservas.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-reservas-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://reservas.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name crackguard.angelproyect.com www.crackguard.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-crackguard-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://crackguard.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name stream.angelproyect.com www.stream.angelproyect.com;

        location /health {
            access_log off;
            return 200 "nginx-stream-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://stream.angelproyect.com$request_uri;
        }
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            return 301 https://admin.angelproyect.com$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - ADMIN.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name admin.angelproyect.com www.admin.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        # ✅ HSTS con preload
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ✅ Limit conexiones simultáneas
        limit_conn addr 50;

        location /health {
            access_log off;
            return 200 "admin-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # ✅ API v1 con rate limiting para login
        location ~ ^/api/v1/(auth/login|clientes/login) {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            # ✅ Proxy headers optimizados
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Ssl $proxy_x_forwarded_ssl;

            # ✅ CORS headers
            add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age "3600" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain" always;
                add_header Content-Length 0 always;
                return 204;
            }

            # ✅ Timeouts optimizados
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # ✅ Buffering optimizado
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
        }

        # ✅ API v1 general
        location /api/v1/ {
            limit_req zone=api burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://admin.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain" always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 32k;
            proxy_busy_buffers_size 64k;
        }

        # ✅ Frontend con cache headers
        location / {
            proxy_pass http://frontend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            # ✅ Cache para assets estáticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend_servers;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        error_page 404 = @admin_fallback;
        location @admin_fallback {
            proxy_pass http://frontend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ✅ Error pages personalizadas
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - RESERVAS.ANGELPROYECT.COM
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name reservas.angelproyect.com www.reservas.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        limit_conn addr 50;

        location /health {
            access_log off;
            return 200 "reservas-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # ✅ Login de clientes con rate limiting estricto
        location ~ ^/api/v1/clientes/(login|registro|refresh) {
            limit_req zone=login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            add_header Access-Control-Allow-Origin "https://reservas.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://reservas.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain" always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
        }

        # ✅ API v1 general
        location /api/v1/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;

            add_header Access-Control-Allow-Origin "https://reservas.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://reservas.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age "3600" always;
                add_header Content-Type "text/plain" always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 16 32k;
        }

        # ✅ Frontend con cache
        location / {
            proxy_pass http://paginawebbtour_servers;
            proxy_http_version 1.1;
            
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://paginawebbtour_servers;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        error_page 404 = @reservas_fallback;
        location @reservas_fallback {
            proxy_pass http://paginawebbtour_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - STREAM.ANGELPROYECT.COM (NO MODIFICADO)
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]: 443 ssl;
        http2 on;
        server_name stream.angelproyect.com www.stream.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /health {
            access_log off;
            return 200 "stream-https-healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://172.17.0.1:19889/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            proxy_buffering off;
            proxy_request_buffering off;
            
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS - CRACKGUARD.ANGELPROYECT.COM (NO MODIFICADO)
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name crackguard.angelproyect.com www.crackguard.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        location /health {
            access_log off;
            return 200 "crackguard-https-healthy\n";
            add_header Content-Type text/plain;
        }

        location = /camera {
            alias /var/www/html/camera.html;
            add_header Content-Type text/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Frame-Options SAMEORIGIN always;
        }

        location /stream/ {
            proxy_pass http://172.17.0.1:19889/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            proxy_buffering off;
            proxy_request_buffering off;
            
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        location /ws/raspberry {
            proxy_pass http://crackguard_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            proxy_buffering off;
        }

        location /api/ {
            limit_req zone=crackguard burst=10 nodelay;

            proxy_pass http://crackguard_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            add_header Access-Control-Allow-Origin "https://crackguard.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://crackguard.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
                add_header Access-Control-Max-Age 1728000 always;
                add_header Content-Type text/plain always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
            client_body_buffer_size 20M;
        }

        location / {
            proxy_pass http://crackguard_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
        }

        error_page 404 = @crackguard_fallback;
        location @crackguard_fallback {
            proxy_pass http://crackguard_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
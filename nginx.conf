server {
    listen 80;
    server_name stream.angelproyect.com www.stream.angelproyect.com;

    location /health {
        access_log off;
        return 200 "nginx-stream-healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://stream.angelproyect.com$request_uri;
    }
}

# ═══════════════════════════════════════════════════════════════
# HTTPS - STREAM.ANGELPROYECT.COM (STREAMING WEBRTC)
# ═══════════════════════════════════════════════════════════════

server {
    listen 443 ssl;
    http2 on;
    server_name stream. angelproyect.com www. stream.angelproyect.com;

    ssl_certificate /etc/nginx/certs/domain.cert.pem;
    ssl_certificate_key /etc/nginx/certs/private.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /health {
        access_log off;
        return 200 "stream-https-healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy directo a FRP (MediaMTX)
    location / {
        proxy_pass http://172.17.0.1:19889/;
        
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        # WebRTC necesita WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        # Sin timeout para streams largos
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
        
        # Sin buffering (crítico para video en vivo)
        proxy_buffering off;
        proxy_request_buffering off;
        
        # CORS permisivo para WebRTC
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
    }
}
    # ═══════════════════════════════════════════════════════════════
    # HTTPS - CRACKGUARD.ANGELPROYECT.COM + FRP STREAMING
    # ═══════════════════════════════════════════════════════════════

    server {
        listen 443 ssl;
        http2 on;
        server_name crackguard.angelproyect.com www.crackguard.angelproyect.com;

        ssl_certificate /etc/nginx/certs/domain.cert.pem;
        ssl_certificate_key /etc/nginx/certs/private.key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location /health {
            access_log off;
            return 200 "crackguard-https-healthy\n";
            add_header Content-Type text/plain;
        }

        # ═══════════════════════════════════════════════════════════════
        # 🎥 PÁGINA HTML PARA CÁMARA WebRTC
        # ═══════════════════════════════════════════════════════════════
        
        location = /camera {
            alias /var/www/html/camera.html;
            add_header Content-Type text/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Frame-Options SAMEORIGIN always;
        }

        # ═══════════════════════════════════════════════════════════════
        # 🆕 PROXY FRP - STREAMING RASPBERRY PI (WebRTC vía MediaMTX)
        # ═══════════════════════════════════════════════════════════════

        location /stream/ {
            # FRP Server en el host (fuera de Docker) en puerto 8889
            # Nginx en Docker accede al host vía 172.17.0.1
            proxy_pass http://172.17.0.1:19889/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # WebRTC necesita WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Sin timeout para streams largos
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # Sin buffering (crítico para video en vivo)
            proxy_buffering off;
            proxy_request_buffering off;
            
            # CORS permisivo para WebRTC
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type, Authorization" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        }

        # ✅ WEBSOCKET PARA RASPBERRY PI (BACKEND)
        location /ws/raspberry {
            proxy_pass http://crackguard_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            proxy_buffering off;
        }

        # API CrackGuard Backend (Flask)
        location /api/ {
            limit_req zone=crackguard burst=10 nodelay;

            proxy_pass http://crackguard_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;

            # CORS para CrackGuard
            add_header Access-Control-Allow-Origin "https://crackguard.angelproyect.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Accept" always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "https://crackguard.angelproyect.com" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Accept" always;
                add_header Access-Control-Max-Age 1728000 always;
                add_header Content-Type text/plain always;
                add_header Content-Length 0 always;
                return 204;
            }

            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_buffering off;
            client_body_buffer_size 20M;
        }

        # Frontend CrackGuard (React)
        location / {
            proxy_pass http://crackguard_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_redirect off;
        }

        # Fallback para React Router
        error_page 404 = @crackguard_fallback;
        location @crackguard_fallback {
            proxy_pass http://crackguard_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
name: Database Backup

on:
  schedule:
    - cron: '18 6 * * *'  # 1:18 AM hora Perú (06:18 UTC)
  workflow_dispatch:      # Permite ejecutarlo manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configurar SSH
      run: |
        mkdir -p ~/.ssh/
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

    - name: Ejecutar backup en servidor
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          docker exec db-backup /scripts/backup-postgres-to-b2.sh
        "

    - name: Verificar log de backup
      # Corregido el error del doble @ y simplificado el comando
      run: |
        ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "
          docker exec db-backup tail -n 20 /backups/backup_log.txt || echo 'No se encontró el log'
        "
